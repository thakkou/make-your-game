<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Tetris</h1>

<div class="game-wrapper">

  <!-- LEFT PANEL -->
  <div class="side">

    <div class="panel">
      <div class="panel-label">Score</div>
      <div class="panel-value">084200</div>
    </div>

    <div class="panel">
      <div class="panel-label">Lines</div>
      <div class="panel-value">042</div>
    </div>

    <div class="panel">
      <div class="panel-label">Level</div>
      <div class="panel-value">05</div>
      <div class="level-bar-track">
        <div class="level-bar-fill"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Hold</div>
      <div class="hold-grid">
        <!-- J piece: row 1 -->
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <div class="hold-cell J"></div>
        <div class="hold-cell"></div>
        <!-- row 2 -->
        <div class="hold-cell J"></div>
        <div class="hold-cell J"></div>
        <div class="hold-cell J"></div>
        <div class="hold-cell"></div>
        <!-- row 3 -->
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <!-- row 4 -->
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
        <div class="hold-cell"></div>
      </div>
    </div>

  </div>

  <!-- BOARD -->
  <div class="board-container">
    <div class="board">

      <!--
        10 cols × 20 rows = 200 cells
        Rows 1-14: mostly empty, with some placed pieces at the bottom
        We use inline class names to colour cells.
      -->

      <!-- ROW 1  (top, empty) -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 2 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 3 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 4  – T-piece falling (active, cols 4-6) -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell T active"></div><div class="cell T active"></div><div class="cell T active"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 5  – T-piece center -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell T active"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 6 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 7 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 8 – ghost of T piece -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell ghost"></div><div class="cell ghost"></div><div class="cell ghost"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 9 – ghost centre -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell ghost"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 10 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 11 – start of placed pieces -->
      <div class="cell"></div><div class="cell"></div>
      <div class="cell I"></div><div class="cell I"></div><div class="cell I"></div><div class="cell I"></div>
      <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>

      <!-- ROW 12 -->
      <div class="cell"></div><div class="cell"></div><div class="cell"></div>
      <div class="cell S"></div><div class="cell S"></div>
      <div class="cell"></div>
      <div class="cell Z"></div><div class="cell Z"></div>
      <div class="cell"></div><div class="cell"></div>

      <!-- ROW 13 -->
      <div class="cell"></div>
      <div class="cell S"></div><div class="cell S"></div>
      <div class="cell"></div>
      <div class="cell Z"></div><div class="cell Z"></div>
      <div class="cell L"></div><div class="cell L"></div><div class="cell L"></div>
      <div class="cell"></div>

      <!-- ROW 14 -->
      <div class="cell J"></div><div class="cell J"></div>
      <div class="cell O"></div><div class="cell O"></div>
      <div class="cell L"></div>
      <div class="cell"></div>
      <div class="cell L"></div>
      <div class="cell"></div>
      <div class="cell J"></div><div class="cell J"></div>

      <!-- ROW 15 -->
      <div class="cell J"></div>
      <div class="cell O"></div><div class="cell O"></div>
      <div class="cell I"></div><div class="cell I"></div><div class="cell I"></div><div class="cell I"></div>
      <div class="cell T"></div><div class="cell T"></div><div class="cell T"></div>

      <!-- ROW 16 -->
      <div class="cell S"></div><div class="cell S"></div>
      <div class="cell Z"></div><div class="cell Z"></div>
      <div class="cell O"></div><div class="cell O"></div>
      <div class="cell J"></div>
      <div class="cell T"></div>
      <div class="cell L"></div><div class="cell L"></div>

      <!-- ROW 17 -->
      <div class="cell S"></div>
      <div class="cell Z"></div><div class="cell Z"></div>
      <div class="cell O"></div><div class="cell O"></div>
      <div class="cell J"></div><div class="cell J"></div><div class="cell J"></div>
      <div class="cell L"></div>
      <div class="cell"></div>

      <!-- ROW 18 – nearly full -->
      <div class="cell I"></div><div class="cell I"></div><div class="cell I"></div><div class="cell I"></div>
      <div class="cell T"></div><div class="cell T"></div><div class="cell T"></div>
      <div class="cell S"></div><div class="cell S"></div>
      <div class="cell"></div>

      <!-- ROW 19 – almost full -->
      <div class="cell L"></div><div class="cell O"></div><div class="cell O"></div>
      <div class="cell Z"></div><div class="cell Z"></div>
      <div class="cell J"></div><div class="cell J"></div><div class="cell J"></div>
      <div class="cell L"></div><div class="cell L"></div>

      <!-- ROW 20 – bottom (full row, clearing) -->
      <div class="cell I clear"></div>
      <div class="cell O clear"></div>
      <div class="cell T clear"></div>
      <div class="cell S clear"></div>
      <div class="cell Z clear"></div>
      <div class="cell L clear"></div>
      <div class="cell J clear"></div>
      <div class="cell I clear"></div>
      <div class="cell O clear"></div>
      <div class="cell T clear"></div>

    </div>

    <!-- GAME OVER OVERLAY — set display:block to show -->
    <div class="status-banner">
      <div class="status-title">Game Over</div>
      <div class="status-sub">Press R to restart</div>
    </div>

  </div><!-- /board-container -->

  <!-- RIGHT PANEL -->
  <div class="side">

    <div class="panel">
      <div class="panel-label">Next</div>
      <div class="next-grid">
        <!-- T piece preview -->
        <div class="next-cell"></div>
        <div class="next-cell T"></div>
        <div class="next-cell T"></div>
        <div class="next-cell T"></div>

        <div class="next-cell"></div>
        <div class="next-cell"></div>
        <div class="next-cell T"></div>
        <div class="next-cell"></div>

        <div class="next-cell"></div>
        <div class="next-cell"></div>
        <div class="next-cell"></div>
        <div class="next-cell"></div>

        <div class="next-cell"></div>
        <div class="next-cell"></div>
        <div class="next-cell"></div>
        <div class="next-cell"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Controls</div>
      <div class="controls-list">
        <div class="ctrl-row"><span>Move</span>     <span><span class="key">← →</span></span></div>
        <div class="ctrl-row"><span>Rotate</span>   <span><span class="key">↑</span></span></div>
        <div class="ctrl-row"><span>Soft drop</span><span><span class="key">↓</span></span></div>
        <div class="ctrl-row"><span>Hard drop</span><span><span class="key">SPC</span></span></div>
        <div class="ctrl-row"><span>Hold</span>     <span><span class="key">C</span></span></div>
        <div class="ctrl-row"><span>Pause</span>    <span><span class="key">P</span></span></div>
        <div class="ctrl-row"><span>Restart</span>  <span><span class="key">R</span></span></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">High Score</div>
      <div class="panel-value" style="font-size:1.1rem;">218 400</div>
    </div>

  </div>

</div><!-- /game-wrapper -->

<footer>CSS-only UI mockup &mdash; add JS to play</footer>

</body>
</html>
